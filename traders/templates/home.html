{% extends 'base.html' %}

{% block base %}

<div class="max-w-7xl mx-auto px-6 py-10">
    <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-8">

        {% for i in form_data %}
        <a href="{% url 'productdetails' i.id %}" class="group">

            <div class="bg-white rounded-2xl shadow-md overflow-hidden transition-all duration-300 hover:shadow-2xl hover:-translate-y-2">

                <!-- Product Image -->
               <div class="bg-gray-100 h-64 flex items-center justify-center overflow-hidden p-6">
    {% with img=i.images.first %}
        {% if img %}
        <img src="{{ img.image.url }}"
             alt="{{ i.title }}"
             class="h-40 w-auto object-contain transition-transform duration-500 group-hover:scale-105">
        {% endif %}
    {% endwith %}
</div>

                <!-- Product Details -->
                <div class="p-5">

                    <p class="text-sm text-orange-500 font-semibold uppercase tracking-wide">
                        {{ i.category }}
                    </p>

                    <h2 class="mt-2 text-lg font-bold text-gray-800 group-hover:text-orange-500 transition-colors line-clamp-2">
                        {{ i.title }}
                    </h2>

                    <div class="mt-4 flex items-center justify-between">

                        <span class="text-2xl font-bold text-gray-900">
                            ₹{{ i.price }}
                        </span>

                        <span class="bg-orange-500 text-white text-sm px-4 py-2 rounded-full transition-colors group-hover:bg-orange-600">
                            View
                        </span>

                    </div>

                </div>

            </div>

        </a>
        {% endfor %}

    </div>
</div>

{% endblock base %}
