{% extends 'base.html' %}

{% block base %}

<div class="relative">
    <div class="h-48 bg-gradient-to-r from-indigo-700 via-violet-600 to-fuchsia-600"></div>

    <!-- Profile Image -->
    <div class="absolute left-1/2 -bottom-16 -translate-x-1/2">
        <div class="relative">

            {% if form.instance.image %}
                <img src="{{ form.instance.image.url }}"
                     class="w-32 h-32 rounded-full border-4 border-white object-cover shadow-lg"
                     alt="Profile">
            {% else %}
                <div class="w-32 h-32 rounded-full border-4 border-white bg-gray-200 flex items-center justify-center shadow-lg">
                    <span class="text-4xl">👤</span>
                </div>
            {% endif %}

        </div>
    </div>
</div>

<div class="max-w-5xl mx-auto mt-24 bg-white rounded-xl shadow-lg p-10">

    <div class="text-center mb-10">
        <h1 class="text-4xl font-bold text-gray-800">Edit Profile</h1>
        <p class="text-gray-500 mt-2">
            Update your personal information
        </p>
    </div>

    <form method="POST" enctype="multipart/form-data" class="space-y-8">
        {% csrf_token %}

        <div>
            <label class="block text-lg font-semibold text-gray-700 mb-2">
                Profile Picture
            </label>

            {{ form.image }}
        </div>

        <div class="grid md:grid-cols-2 gap-6">

            <div>
                <label class="block mb-2 font-semibold text-gray-700">
                    Phone Number
                </label>
                {{ form.phone }}
            </div>

            <div>
                <label class="block mb-2 font-semibold text-gray-700">
                    Address
                </label>
                {{ form.address }}
            </div>

            <div>
                <label class="block mb-2 font-semibold text-gray-700">
                    Latitude
                </label>
                {{ form.latitude }}
            </div>

            <div>
                <label class="block mb-2 font-semibold text-gray-700">
                    Longitude
                </label>
                {{ form.longitude }}
            </div>

        </div>

        <div class="flex justify-end gap-4">

            <a href="{% url 'profile' %}"
               class="px-6 py-3 rounded-lg border border-gray-300 hover:bg-gray-100">
                Cancel
            </a>

            <button
                type="submit"
                class="px-8 py-3 rounded-lg bg-indigo-600 hover:bg-indigo-700 text-white font-semibold shadow-md">
                Save Changes
            </button>

        </div>

    </form>

</div>

{% endblock %}
