{% extends 'base.html' %}
{% block base %}
    <!-- Header -->
    <div class="relative">
        <div class="h-48 bg-gradient-to-r from-indigo-700 via-violet-600 to-fuchsia-600"></div>

        <!-- Profile Image -->
        <div class="absolute left-1/2 -bottom-16 -translate-x-1/2">
            <div class="relative">
                <img src="user.jpg"
                    class="w-32 h-32 rounded-full border-4 border-white object-cover shadow-lg"
                    alt="Profile">

                <label
                    class="absolute bottom-1 right-1 bg-indigo-600 hover:bg-indigo-700 text-white p-2 rounded-full cursor-pointer shadow">
                    📷
                    <input type="file" class="hidden">
                </label>
            </div>
        </div>
    </div>

    <!-- Content -->
    <div class="max-w-5xl mx-auto mt-24 bg-white rounded-xl shadow-lg p-10">

        <div class="text-center mb-10">
            <h1 class="text-4xl font-bold text-gray-800">Edit Profile</h1>
            <p class="text-gray-500 mt-2">
                Update your personal information
            </p>
        </div>

        <form class="space-y-8">

            <!-- Current Image -->
            <div>
                <label class="block text-lg font-semibold text-gray-700 mb-2">
                    Profile Picture
                </label>

                <p class="text-sm text-gray-500 mb-3">
                    Current: user.jpg
                </p>

                <input
                    type="file"
                    class="block w-full rounded-lg border border-gray-300 text-sm file:bg-indigo-600 file:text-white file:border-0 file:px-5 file:py-3 file:mr-4 file:cursor-pointer hover:file:bg-indigo-700">
            </div>

            <!-- Grid -->
            <div class="grid md:grid-cols-2 gap-6">

                <!-- Phone -->
                <div>
                    <label class="block mb-2 font-semibold text-gray-700">
                        Phone Number
                    </label>

                    <input
                        type="text"
                        placeholder="Enter phone number"
                        class="w-full rounded-lg border border-gray-300 px-4 py-3 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none">
                </div>

                <!-- Email -->
                <div>
                    <label class="block mb-2 font-semibold text-gray-700">
                        Email
                    </label>

                    <input
                        type="email"
                        placeholder="Enter email"
                        class="w-full rounded-lg border border-gray-300 px-4 py-3 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none">
                </div>

                <!-- Address -->
                <div class="md:col-span-2">
                    <label class="block mb-2 font-semibold text-gray-700">
                        Address
                    </label>

                    <textarea
                        rows="4"
                        placeholder="Enter address"
                        class="w-full rounded-lg border border-gray-300 px-4 py-3 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none"></textarea>
                </div>

            </div>

            <!-- Buttons -->
            <div class="flex justify-end gap-4">

                <button
                    type="button"
                    class="px-6 py-3 rounded-lg border border-gray-300 hover:bg-gray-100">
                    Cancel
                </button>

                <button
                    type="submit"
                    class="px-8 py-3 rounded-lg bg-indigo-600 hover:bg-indigo-700 text-white font-semibold shadow-md">
                    Save Changes
                </button>

            </div>

        </form>

    </div>

{% endblock base %}
