{% extends 'base.html' %}

{% block base %}

<div class="min-h-screen bg-gray-100 py-10">

    <div class="max-w-4xl mx-auto">

        <div class="bg-white rounded-2xl shadow-xl overflow-hidden">

            <!-- Header -->
            <div class="bg-gradient-to-r from-indigo-600 via-blue-600 to-purple-600 px-8 py-8">

                <h2 class="text-3xl font-bold text-white">
                    Sell Your Product
                </h2>

                <p class="text-indigo-100 mt-2">
                    Fill in the details below to list your product.
                </p>

            </div>

            <!-- Form -->
            <div class="p-8">

                <form method="POST"
                      enctype="multipart/form-data"
                      class="space-y-6">

                    {% csrf_token %}

                    <div class="space-y-5">

                        {{ form_data.as_p }}

                    </div>

                    <div>

                        <label class="block text-sm font-semibold text-gray-700 mb-2">
                            Product Images
                        </label>

                        <input
                            type="file"
                            name="images"
                            multiple
                            class="block w-full text-sm text-gray-600
                                   file:mr-4
                                   file:py-3
                                   file:px-5
                                   file:rounded-lg
                                   file:border-0
                                   file:bg-indigo-600
                                   file:text-white
                                   hover:file:bg-indigo-700
                                   cursor-pointer">

                        <p class="text-xs text-gray-500 mt-2">
                            You can upload multiple images.
                        </p>

                    </div>

                    <div class="flex justify-end gap-4 pt-4">

                        <a href="{% url 'homepage' %}"
                           class="px-6 py-3 rounded-lg border border-gray-300 hover:bg-gray-100">

                            Cancel

                        </a>

                        <button
                            type="submit"
                            class="px-8 py-3 rounded-lg bg-indigo-600 hover:bg-indigo-700 text-white font-semibold shadow">

                            Sell Now

                        </button>

                    </div>

                </form>

            </div>

        </div>

    </div>

</div>
{% endblock base %}
