
{% extends 'base.html' %}
{% block base %}

<style>
    .form-container {
        max-width: 600px;
        margin: 40px auto;
        padding: 25px;
        background: #ffffff;
        border-radius: 12px;
        box-shadow: 0 8px 25px rgba(0,0,0,0.08);
        font-family: Arial, sans-serif;
    }

    .form-container h2 {
        text-align: center;
        margin-bottom: 20px;
        color: #333;
    }

    table {
        width: 100%;
    }

    input, select, textarea {
        width: 100%;
        padding: 10px;
        margin: 6px 0 14px 0;
        border: 1px solid #ddd;
        border-radius: 8px;
        outline: none;
        transition: 0.2s;
    }

    input:focus, select:focus, textarea:focus {
        border-color: #4CAF50;
        box-shadow: 0 0 5px rgba(76,175,80,0.3);
    }

    .file-input {
        margin: 10px 0 20px 0;
    }

    .btn-submit {
        width: 100%;
        padding: 12px;
        background: linear-gradient(135deg, #4CAF50, #2E7D32);
        color: white;
        border: none;
        border-radius: 8px;
        font-size: 16px;
        cursor: pointer;
        transition: 0.3s;
    }

    .btn-submit:hover {
        transform: scale(1.02);
        background: linear-gradient(135deg, #43A047, #1B5E20);
    }
</style>

<div class="form-container">
    <h2>Sell Your Product</h2>

    <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}

        <table>
            {{ form_data.as_table }}
        </table>

        <div class="file-input">
            <label><b>Upload Product Images</b></label>
            <input type="file" name="images" multiple>
        </div>

        <button type="submit" class="btn-submit">Sell Now</button>
    </form>
</div>

{% endblock base %}
